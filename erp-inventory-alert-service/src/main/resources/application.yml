server:
  port: 8086

spring:
  application:
    name: erp-inventory-alert-service
  
  # 数据库配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/omnitrade_erp
    username: postgres
    password: postgres
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # 邮件配置
  mail:
    host: smtp.example.com
    port: 587
    username: noreply@example.com
    password: password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.crossborder.erp.inventory.alert.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.crossborder.erp.inventory.alert: DEBUG
    org.springframework: INFO