server:
  port: 8081

spring:
  application:
    name: erp-tenant-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:omnitrade_tenant}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:OmniTradeERP Secret Key For SaaS 2026 Multi-Tenant Platform}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.crossborder: INFO