version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: erp-lite-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: erp
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-lite-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - erp-lite-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: erp-lite-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-lite-data:/data
    networks:
      - erp-lite-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos
  nacos:
    image: nacos/nacos-server:v2.4.0
    container_name: erp-lite-nacos
    environment:
      MODE: standalone
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: erp
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 512m
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-lite-data:/home/nacos/data
      - nacos-lite-logs:/home/nacos/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - erp-lite-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-lite-data:
  redis-lite-data:
  nacos-lite-data:
  nacos-lite-logs:

networks:
  erp-lite-network:
    driver: bridge
