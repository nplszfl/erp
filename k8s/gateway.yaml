apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-gateway
  namespace: erp
  labels:
    app: erp-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: erp-gateway
  template:
    metadata:
      labels:
        app: erp-gateway
    spec:
      containers:
      - name: gateway
        image: nplszfl/erp-gateway:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: NACOS_SERVER_ADDR
          value: "nacos-service:8848"
        - name: SENTINEL_DASHBOARD
          value: "sentinel-service:8858"
        - name: TZ
          value: "Asia/Shanghai"
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: erp-gateway-service
  namespace: erp
  labels:
    app: erp-gateway
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: erp-gateway
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-ingress
  namespace: erp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: erp.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: erp-gateway-service
            port:
              number: 8080
