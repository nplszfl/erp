version: '3.8'

# OmniTrade ERP - 最小化部署（推荐）
# 包含：基础设施 + 4 个核心服务
# 适用于 Docker Desktop

services:
  # ========== 基础设施 (3个) ==========
  
  mysql:
    image: mysql:8.0
    container_name: erp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: erp
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  nacos:
    image: nacos/nacos-server:v2.4.0
    container_name: erp-nacos
    environment:
      MODE: standalone
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: erp
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 512m
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - erp-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s

  # ========== 核心服务 (3个) ==========

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: erp-gateway
    ports:
      - "8080:8080"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    networks:
      - erp-network
    depends_on:
      nacos:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.order
    container_name: erp-user-service
    ports:
      - "8081:8081"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms256m -Xmx512m"
    networks:
      - erp-network
    depends_on:
      mysql:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.order
    container_name: erp-order-service
    ports:
      - "8083:8083"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms256m -Xmx512m"
    networks:
      - erp-network

volumes:
  mysql-data:
  redis-data:
  nacos-data:

networks:
  erp-network:
    driver: bridge